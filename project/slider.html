<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@8.4.7/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@8.4.7/swiper-bundle.min.js"></script>
    <style>
        .swiper {
            width: 100%;
            height: auto;
            /* wdith : 800px 등 원하는 크기 가능 */
        }
        /* 슬라이드 안의 이미지가 영역에 딱 맞게 들어가도록 설정 */
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- html. 반드시 id가 app인 태그 안에서 작업 -->
        <!-- (script 맨 하단 app.mount('#app'); 여기 아이디와 같아야 함) -->
    </div>
</body>
</html>
<div class="swiper">
	<div class="swiper-wrapper">
		<div class="swiper-slide">
            <img src="../media/banner1.png" alt="">
        </div>
		<div class="swiper-slide">
            <img src="../media/banner2.png" alt="">
        </div>
		<div class="swiper-slide">
            <img src="../media/banner3.png" alt="">
        </div>
        <div class="swiper-slide">
            <img src="../media/banner4.png" alt="">
        </div>
        <div class="swiper-slide">
            <img src="../media/banner5.png" alt="">
        </div>
	</div>
	<div class="swiper-pagination"></div>
	<div class="swiper-button-next"></div>
	<div class="swiper-button-prev"></div>
</div>
<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
            };
        },
        methods: {
            fnInit: function() {
                const swiper = new Swiper('.swiper', {
	            // 기본 옵션 설정
                    loop: true, // 반복
                    autoplay: {
                        delay: 2500,
                    },
                    pagination: {
                        el: '.swiper-pagination',
                        clickable: true,
                    },
                    navigation: {
                        nextEl: '.swiper-button-next',
                        prevEl: '.swiper-button-prev',
                    },
                });
            },
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
            let self = this;
            self.fnInit();
        }
    });

    app.mount('#app');
        
    
</script>
