<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body{
            background-color: #eee;
        }
        #container{
            width: 400px;
            height: 600px;
            background-color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            margin: 100px auto;
            padding: 20px;
            /* justify-content: space-around; */
        }
        #head{
            text-align: center;
        }
        #subhead{
            text-align: center;
            color: #bbb;
        }
        a{
            text-decoration: none;
            padding: 10px;
            color: #bbb;            
        }
        label{
            font-weight: bold;
            padding: 10px;
        }
        input{
            border-radius: 5px;
            width: 370px;
            height: 50px;
            border: 1px solid #ccc;
        }
        #button{
            margin: 10px;
            padding: 20px;
            background-color: #4688d5;
            color: white;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #4688d5;
        }
        #tag{
            text-align: center;
        }
        
    </style>
</head>
<body>
    <div id="app">
        <div id="container">
            <h1 id="head">환영합니다</h1>
            <div id="subhead">서비스 이용을 위해 로그인해주세요.</div>
        <br>
        <label>아이디<br><input id="id" type="text" v-model="userId" placeholder="  아이디를 입력해주세요."></label>
        <label>비밀번호<br><input @keyup.enter="fnLogin"  id="pwd" type="password" v-model="pwd" placeholder="  비밀번호를 입력하세요."></label>

        <button id="button" @click="fnLogin">로그인</button>

        <div id="tag">
            <a href="#">비밀번호 찾기</a>
            <a style="font-weight: bold;">|</a>
            <a href="Join.html">회원가입</a>
        </div>
        </div>
    </div>
</body>
</html>
<script>
    // let id = document.querySelector("#id").value;
    // let pwd = document.querySelector("#pwd").value;   이러면 안되고 브이모델 써서

    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                userId : "",
                pwd : ""
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnLogin: function () {         
                let self = this;       //이거 만들고 쓰는게 안전 
                let param = {          //밖에서 만들어서 data에 넣어버리면 편하다는데
                    userId : self.userId,
                    pwd : self.pwd
                };   
                $.ajax({
                    url: "http://192.168.30.57:3009/login",  //http   s붙이지마!    /login까지 가야함
                    dataType: "json",
                    type: "GET",
                    data : param,
                    // data: {userId : self.userId, pwd : self.pwd},
                    success: function (data) {
                        console.log(data);              // 서버에서 뭐 보내는지 확인하는
                        alert(data.message);
                        if(data.success){
                            localStorage.setItem("sessionId", data.userInfo.USERID);       //함수가 맵형태가 아니라 키 밸류 두개 보내야
                            localStorage.setItem("sessionName", data.userInfo.USERNAME);
                            localStorage.setItem("sessionGender", data.userInfo.GENDER);
                            location.href="product-home.html";       //l 소문자
                        }
                    }
                });
            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
        }
    });
    
    app.mount('#app');
</script>
