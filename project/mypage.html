<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

</head>

</body>
</html>
<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnId: function () {
                let self = this;
                $.ajax({
                    url: "http://192.168.30.57:3009/user/info",
                    dataType: "json",
                    type: "GET",
                    data: {userId : self.productId},
                    success: function (data) {
                        console.log(data);
                        self.info = data.info;    // 서버에서 받은 info를 내가 선언한 info 에 넣어야 위에서 쓸 수 있다
                    }
                });
            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
            const queryParams = new URLSearchParams(window.location.search);//window.location.search주소에서  ? 뒤에꺼 따로 떼는 역할
            this.productId = queryParams.get('productId') || '';
            this.fnId();
        }
    });

    app.mount('#app');
</script>
