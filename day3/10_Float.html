<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            width: 1000px;
            margin: 5px auto;
        }
        #header{
            width: 100%;  /*전체영역차지함 */
            height: 150px;
            background-color: antiquewhite;
        }
        #contents{
            width: 500px;
            height: 600px;
            border: 2px solid black; /* 얘땜에 크기 늘어나서 다른게 밀려날수 있다 */
            background-color: aqua;
            float: left;
            box-sizing: border-box; /* 패딩이나 border를 합쳐서 크기를 맞춰준다. 패딩 보더 얼마던 합쳐서700 맞춰줘 습관적으로 넣어주는게 좋다*/
        }
        #sidebar{
            width: 300px;
            height: 600px;
            background-color: aquamarine;
            float: left;
        }
        #footer{
            width: 100%;
            height: 150px;
            background-color: #eee;
            clear: both;
        }
        #menubar{
            width: 200px;
            height: 600px;
            background-color: blueviolet;
            float: left;
            box-sizing: border-box
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            검색기능 메뉴 등등
        </div>
        <div id="menubar">
            메뉴~~~
        </div>
        <div id="contents">
            주요 기능 넣기~~~
        </div>
        <div id="sidebar">
            로그인 
        </div>
        <div id="footer">
            사이트정보
        </div>
    </div>
</body>
</html>
