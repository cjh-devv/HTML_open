<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            /* text-align: center; */
            /* line-height: 200px; */
            /* color: white; */
        }
        .box1{
            background-color: black;
            width: 300px;
            height: 300px;
            float: left;
        }
        .box2{
            background-color: blue;
            width: 300px;
            height: 300px;
            float: left;
        }
        .box3{
            background-color: green;
            width: 300px;
            height: 300px;
            clear: both;      /* 플로트 그만해*/
        }
    </style>
</head>
<body>
    <!-- float는 화면에 떠 있는 느낌 float끼리는 겹치면 정렬함-->
     <div class="box1">box1</div>
     <div class="box2">box2</div>
     <div class="box3">box3</div>
</body>
</html>
